<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="css/weather.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="title">Weather App</h1>
    <div class="search-box">
            <input type="search" id="locationInput" class="input-search" placeholder="Search city" >
            <button type="submit" id="searchButton" onclick="searchLocation()">Search</button>
    </div>
    <div class="results">
        <h4 id="result-city"></h4>
        <div class="result-container">
            <div class="icon-flex">
                <div>
                    <h4 id="temperature">35 °C</h4>
                    <h5 id="temperature-max">41 °C</h5>
                    <h5 id="temperature-min">28 °C</h5>
                </div>
            <img id="temperature-icon" alt="weather icon" />
            </div>
        </div>
    </div>
    <h2 style="text-align: center; margin-top: 30px;">7-Day Forecast</h2>
    <div id="forecast-container"></div>

    <script src="js/weather.js"></script>
</body>
</html>
